<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#F4F7FC;font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px;align-items:flex-start}
  button{font-family:inherit;border:none;border-radius:99px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:600;letter-spacing:.3px}
  .primary{background:linear-gradient(180deg,#3A86FF 0%,#1E6FE0 100%);color:#fff;height:44px;padding:0 22px;font-size:14.5px;box-shadow:0 8px 18px -6px rgba(30,111,224,.45)}
  .deep{background:linear-gradient(180deg,#2A6CD3 0%,#0A4FB8 100%);color:#fff;height:50px;padding:0 24px;font-size:15px;box-shadow:0 10px 24px -10px rgba(10,79,184,.55)}
  .ghost{background:#fff;color:#1E6FE0;border:1px solid #BFD6F7;height:44px;padding:0 22px;font-size:14.5px}
  .soft{background:#E8F1FE;color:#0A4FB8;height:36px;padding:0 16px;font-size:13px}
  .dark{background:#0F1F3A;color:#fff;height:44px;padding:0 22px;font-size:14.5px}
</style></head><body>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <button class="primary">立即报修</button>
  <button class="ghost">查看详情</button>
  <button class="soft">查看全部</button>
  <button class="dark">取消</button>
</div>
<button class="deep" style="width:100%;max-width:300px">立即提交报修</button>
</body></html>
