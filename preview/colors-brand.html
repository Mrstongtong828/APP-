<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .chip{height:64px;border-radius:10px;border:1px solid var(--line)}
  .name{font-size:12px;font-weight:600;color:var(--fg-1)}
  .hex{font-size:11px;color:var(--fg-3);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1E6FE0"></div><div class="name">brand</div><div class="hex">#1E6FE0</div></div>
  <div class="sw"><div class="chip" style="background:#3A86FF"></div><div class="name">brand-2</div><div class="hex">#3A86FF</div></div>
  <div class="sw"><div class="chip" style="background:#0A4FB8"></div><div class="name">brand-deep</div><div class="hex">#0A4FB8</div></div>
  <div class="sw"><div class="chip" style="background:#E8F1FE"></div><div class="name">brand-soft</div><div class="hex">#E8F1FE</div></div>
  <div class="sw"><div class="chip" style="background:#F3F8FF"></div><div class="name">brand-mist</div><div class="hex">#F3F8FF</div></div>
  <div class="sw"><div class="chip" style="background:#2C5985"></div><div class="name">brand-stone</div><div class="hex">#2C5985</div></div>
  <div class="sw"><div class="chip" style="background:#1AAACE"></div><div class="name">brand-tooth</div><div class="hex">#1AAACE</div></div>
</div>
</body></html>
