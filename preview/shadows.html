<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:30px;background:#EEF2F8;font-family:var(--font-sans);display:flex;gap:20px;justify-content:center;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .card{width:90px;height:60px;background:#fff;border-radius:12px}
  .nm{font-size:12px;font-weight:600;color:var(--fg-1)}
  .meta{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);text-align:center;line-height:1.4}
</style></head><body>
<div class="item">
  <div class="card" style="box-shadow:0 1px 2px rgba(15,31,58,.04), 0 4px 14px rgba(30,111,224,.05)"></div>
  <div class="nm">shadow-sm</div>
  <div class="meta">cards<br/>row tiles</div>
</div>
<div class="item">
  <div class="card" style="box-shadow:0 4px 14px rgba(15,31,58,.07), 0 12px 32px rgba(30,111,224,.07)"></div>
  <div class="nm">shadow-md</div>
  <div class="meta">heroes<br/>modals</div>
</div>
<div class="item">
  <div class="card" style="background:linear-gradient(180deg,#3A86FF 0%,#1E6FE0 100%);box-shadow:0 10px 24px -10px rgba(10,79,184,.55)"></div>
  <div class="nm">shadow-brand</div>
  <div class="meta">primary CTA<br/>blue spread</div>
</div>
<div class="item">
  <div class="card" style="background:linear-gradient(180deg,#3A86FF 0%,#1E6FE0 100%);box-shadow:0 8px 22px -6px rgba(30,111,224,.55);border:2px solid #fff"></div>
  <div class="nm">shadow-float</div>
  <div class="meta">FAB<br/>floating cluster</div>
</div>
</body></html>
