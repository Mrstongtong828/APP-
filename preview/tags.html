<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#F4F7FC;font-family:var(--font-sans)}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500;letter-spacing:.2px}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600}
  h5{font-size:11px;margin:0 0 8px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.5px}
</style></head><body>
<h5>Status tags</h5>
<div class="row">
  <span class="tag" style="background:#E8F1FE;color:#0A4FB8">9 大模块</span>
  <span class="tag" style="background:#DCFCE7;color:#047857">已完成</span>
  <span class="tag" style="background:#FEF3C7;color:#92400E">待开具</span>
  <span class="tag" style="background:#FEE2E2;color:#B91C1C">已逾期</span>
  <span class="tag" style="background:#E0F2FE;color:#0369A1">维修中</span>
  <span class="tag" style="background:#EEF2F8;color:#6B7C97">未分配</span>
</div>
<h5>Filled pills</h5>
<div class="row">
  <span class="pill" style="background:#1E6FE0;color:#fff">全部</span>
  <span class="pill" style="background:#fff;color:#324563;border:1px solid #E4ECF7">待处理</span>
  <span class="pill" style="background:#fff;color:#324563;border:1px solid #E4ECF7">维修中</span>
</div>
<h5>Membership / ribbon</h5>
<div class="row">
  <span class="tag" style="background:rgba(255,255,255,.18);color:#fff;background:linear-gradient(180deg,#3A86FF,#1E6FE0);padding:3px 12px;font-weight:600">高级会员</span>
  <span class="tag" style="background:#FFF7E6;color:#A16207;padding:4px 12px;font-weight:600">🎁 调研有礼</span>
</div>
</body></html>
