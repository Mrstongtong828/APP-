<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:14px;background:#E8EEFA;font-family:var(--font-sans);color:var(--fg-1)}
  .top{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#fff;border-radius:12px 12px 0 0;border-bottom:1px solid var(--line)}
  .title{font-size:16px;font-weight:600;letter-spacing:.2px}
  .cap{height:32px;width:87px;border-radius:99px;background:rgba(0,0,0,.04);border:.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-around}
  .nav{display:flex;justify-content:space-around;background:#fff;border-top:1px solid var(--line);border-radius:0 0 12px 12px;padding:8px 0 6px}
  .item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 14px}
  .item span{font-size:10.5px}
  .ic{width:24px;height:24px}
  .ph{height:30px}
</style></head><body>
<div class="top">
  <div style="width:24px;display:flex;align-items:center"><svg width="11" height="18" viewBox="0 0 11 18"><path d="M9 1L2 9l7 8" stroke="#0F1F3A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="title">维修进度</div>
  <div class="cap">
    <svg width="18" height="4" viewBox="0 0 18 4"><circle cx="2" cy="2" r="1.6" fill="#0F1F3A"/><circle cx="9" cy="2" r="1.6" fill="#0F1F3A"/><circle cx="16" cy="2" r="1.6" fill="#0F1F3A"/></svg>
    <div style="width:.5px;height:16px;background:rgba(0,0,0,.15)"></div>
    <svg width="14" height="14" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="none" stroke="#0F1F3A" stroke-width="1.2"/><circle cx="8" cy="8" r="2.5" fill="#0F1F3A"/></svg>
  </div>
</div>
<div class="ph"></div>
<div class="nav">
  <button class="item" style="border:none;background:none;color:#1E6FE0">
    <svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-8 9 8v10a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1V11z" stroke="#1E6FE0" stroke-width="1.8" fill="rgba(30,111,224,.12)" stroke-linejoin="round"/></svg>
    <span style="color:#1E6FE0;font-weight:600">首页</span>
  </button>
  <button class="item" style="border:none;background:none;color:#94A3B8">
    <svg class="ic" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="17" rx="1.5" stroke="#94A3B8" stroke-width="1.8"/><path d="M9 9h2M13 9h2M9 13h2M13 13h2M9 17h6" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span style="color:#94A3B8">公司介绍</span>
  </button>
  <button class="item" style="border:none;background:none;color:#94A3B8">
    <svg class="ic" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#94A3B8" stroke-width="1.8"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#94A3B8" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span style="color:#94A3B8">我的</span>
  </button>
</div>
</body></html>
