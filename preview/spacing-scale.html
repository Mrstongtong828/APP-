<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .box{background:var(--brand);border-radius:4px}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:60px}
  .nm{font-size:13px;font-weight:600;color:var(--fg-1)}
  .px{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-4);margin-left:auto}
</style></head><body>
<div class="row"><div class="lab">space-1</div><div class="box" style="width:4px;height:14px"></div><div class="nm">tight</div><div class="px">4px</div></div>
<div class="row"><div class="lab">space-2</div><div class="box" style="width:8px;height:14px"></div><div class="nm">inline gap</div><div class="px">8px</div></div>
<div class="row"><div class="lab">space-3</div><div class="box" style="width:10px;height:14px"></div><div class="nm">grid gap</div><div class="px">10px</div></div>
<div class="row"><div class="lab">space-4</div><div class="box" style="width:14px;height:14px"></div><div class="nm">card padding · row pad</div><div class="px">14px</div></div>
<div class="row"><div class="lab">space-5</div><div class="box" style="width:18px;height:14px"></div><div class="nm">hero card padding</div><div class="px">18px</div></div>
<div class="row"><div class="lab">space-6</div><div class="box" style="width:22px;height:14px"></div><div class="nm">section gap</div><div class="px">22px</div></div>
<div class="row"><div class="lab">space-7</div><div class="box" style="width:28px;height:14px"></div><div class="nm">page top gap</div><div class="px">28px</div></div>
</body></html>
