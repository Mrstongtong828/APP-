<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:#F4F7FC;font-family:var(--font-sans);color:var(--fg-1)}
  .group{background:#fff;border-radius:12px}
  .row{display:flex;align-items:center;padding:14px;border-bottom:1px solid #F1F5FB;min-height:48px;gap:10px}
  .row:last-child{border-bottom:none}
  .lab{width:90px;font-size:13.5px;color:var(--fg-2);flex-shrink:0;display:flex;align-items:center}
  .req{color:var(--danger);margin-right:2px}
  .val{flex:1;font-size:13.5px;color:var(--fg-1)}
  .ph{flex:1;font-size:13.5px;color:var(--fg-4)}
  .ic{width:18px;height:18px;color:var(--fg-4)}
</style></head><body>
<div class="group">
  <div class="row"><div class="lab">产品名称</div><div class="val">NSK Ti-Max Z95L</div></div>
  <div class="row"><div class="lab"><span class="req">*</span>产品型号</div><div class="ph">请输入</div></div>
  <div class="row"><div class="lab"><span class="req">*</span>产品序列号</div><div class="ph">请输入</div></div>
  <div class="row"><div class="lab">购买日期</div><div class="ph">请选择</div>
    <svg class="ic" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="#94A3B8" stroke-width="1.6"/><path d="M3 9h18M8 3v4M16 3v4" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round"/></svg>
  </div>
</div>
</body></html>
