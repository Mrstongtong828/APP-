<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:flex;gap:14px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:60px;height:60px;background:var(--brand-soft);border:1.5px solid var(--brand);}
  .lab{font-size:11px;font-weight:600;color:var(--fg-1)}
  .px{font-size:10px;color:var(--fg-3);font-family:var(--font-mono)}
</style></head><body>
<div class="item"><div class="box" style="border-radius:4px"></div><div class="lab">xs</div><div class="px">4px</div></div>
<div class="item"><div class="box" style="border-radius:8px"></div><div class="lab">sm</div><div class="px">8px</div></div>
<div class="item"><div class="box" style="border-radius:12px"></div><div class="lab">md · default</div><div class="px">12px</div></div>
<div class="item"><div class="box" style="border-radius:14px"></div><div class="lab">lg · card</div><div class="px">14px</div></div>
<div class="item"><div class="box" style="border-radius:18px"></div><div class="lab">xl · sheet</div><div class="px">18px</div></div>
<div class="item"><div class="box" style="border-radius:99px"></div><div class="lab">pill</div><div class="px">99px</div></div>
</body></html>
