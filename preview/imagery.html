<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);display:flex;gap:14px}
  .photo{flex:1;height:160px;border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(135deg,#1A3C5C 0%,#2C5985 50%,#4A7BA6 100%)}
  .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(15,46,102,.35) 0%, rgba(15,31,58,.65) 100%)}
  .cap{position:absolute;left:14px;bottom:12px;color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px}
  .nm{position:absolute;right:10px;top:10px;background:rgba(255,255,255,.92);font-size:10px;color:var(--fg-2);padding:3px 6px;border-radius:4px;font-family:var(--font-mono)}
</style></head><body>
<div class="photo">
  <img src="../assets/photo-building.jpg"/>
  <div class="overlay"></div>
  <div class="nm">photo-building</div>
  <div class="cap">十年匠心 守护诊疗安全</div>
</div>
<div class="photo">
  <img src="../assets/photo-factory.jpg"/>
  <div class="overlay"></div>
  <div class="nm">photo-factory</div>
  <div class="cap">专业医疗设备维保</div>
</div>
</body></html>
