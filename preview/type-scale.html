<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  .stack{display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:baseline;gap:14px}
  .lab{width:70px;font-size:10.5px;color:var(--fg-3);font-family:var(--font-mono);flex-shrink:0;padding-top:4px}
  .spec{line-height:1.15}
</style></head><body>
<div class="stack">
  <div class="row"><div class="lab">display 30</div><div class="spec" style="font-size:30px;font-weight:700;letter-spacing:-.5px">牙医仪器检修</div></div>
  <div class="row"><div class="lab">h1 · 20</div><div class="spec" style="font-size:20px;font-weight:700">立即报修</div></div>
  <div class="row"><div class="lab">h2 · 17</div><div class="spec" style="font-size:17px;font-weight:700">桂林口腔门诊</div></div>
  <div class="row"><div class="lab">h3 · 15</div><div class="spec" style="font-size:15px;font-weight:700">基础服务</div></div>
  <div class="row"><div class="lab">body · 15</div><div class="spec" style="font-size:15px">致力于为齿科机构提供精密仪器维保服务。</div></div>
  <div class="row"><div class="lab">sm · 13</div><div class="spec" style="font-size:13px;color:var(--fg-2)">产品序列号</div></div>
  <div class="row"><div class="lab">xs · 11.5</div><div class="spec" style="font-size:11.5px;color:var(--fg-3)">工作时间 9:00-18:00 · 周一至周六</div></div>
</div>
</body></html>
