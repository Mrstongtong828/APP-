<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&family=Noto+Serif+SC:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
  .grp{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  h5{font-size:11px;margin:0;color:var(--fg-3);text-transform:uppercase;letter-spacing:.6px}
  .spec{font-size:18px;line-height:1.2}
  .meta{font-size:10.5px;color:var(--fg-4);font-family:var(--font-mono);margin-left:8px}
</style></head><body>
<div class="grp">
  <h5>Noto Sans SC · primary face</h5>
  <div><span class="spec" style="font-weight:400">立即报修 · CICADA</span><span class="meta">400</span></div>
  <div><span class="spec" style="font-weight:500">立即报修 · CICADA</span><span class="meta">500</span></div>
  <div><span class="spec" style="font-weight:600">立即报修 · CICADA</span><span class="meta">600</span></div>
  <div><span class="spec" style="font-weight:700">立即报修 · CICADA</span><span class="meta">700</span></div>
  <div><span class="spec" style="font-weight:800">立即报修 · CICADA</span><span class="meta">800</span></div>
</div>
<div class="grp">
  <h5>Noto Serif SC · wordmark accent</h5>
  <div style="font-family:var(--font-serif);font-weight:800;font-size:28px;letter-spacing:1.2px;color:var(--brand)">CICADA</div>
  <div style="font-family:var(--font-serif);font-weight:700;font-size:18px;color:var(--fg-2)">思科达官网</div>
</div>
</body></html>
