<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px;background:#E8EEFA;font-family:var(--font-sans);color:var(--fg-1)}
  .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(15,31,58,.04), 0 4px 14px rgba(30,111,224,.05);margin-bottom:10px}
  .head{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .bar{width:3px;height:14px;background:var(--brand);border-radius:2px}
  .title{font-size:15px;font-weight:700}
  .row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F1F5FB}
  .row:last-child{border-bottom:none}
  .l{font-size:11.5px;color:var(--fg-3)}
  .v{font-size:13.5px;font-weight:600;color:var(--fg-1);margin-top:3px}
  .hero{background:linear-gradient(135deg,#1E6FE0,#3A86FF);color:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 14px rgba(15,31,58,.07), 0 12px 32px rgba(30,111,224,.07)}
  .hero .num{font-size:16px;font-weight:700;letter-spacing:.5px;margin-top:2px}
</style></head><body>
<div class="card">
  <div class="head"><div class="bar"></div><div class="title">收件信息</div></div>
  <div class="row"><div><div class="l">收件人</div><div class="v">售后李山</div></div></div>
  <div class="row"><div><div class="l">收件电话</div><div class="v">13977382317</div></div></div>
</div>
<div class="hero">
  <div style="display:flex;justify-content:space-between"><div style="font-size:11px;opacity:.85">工单号</div><span style="background:rgba(255,255,255,.2);padding:3px 8px;border-radius:99px;font-size:11px">维修中</span></div>
  <div class="num">DR-20260508-1147</div>
</div>
</body></html>
