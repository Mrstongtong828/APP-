<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280, initial-scale=1" />
<title>牙医仪器检修小程序 · 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand:#1E6FE0;
    --brand-2:#3A86FF;
    --brand-deep:#0A4FB8;
    --brand-soft:#E8F1FE;
    --brand-mist:#F3F8FF;
    --ink:#0F1F3A;
    --ink-2:#324563;
    --ink-3:#6B7C97;
    --line:#E4ECF7;
    --bg:#F4F7FC;
    --white:#fff;
    --danger:#E5484D;
    --warn:#F59E0B;
    --ok:#10B981;
    --shadow-sm:0 1px 2px rgba(15,31,58,.06), 0 2px 6px rgba(30,111,224,.05);
    --shadow-md:0 4px 14px rgba(15,31,58,.07), 0 12px 32px rgba(30,111,224,.07);
    --radius:14px;
    --radius-lg:18px;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;background:#EEF2F8;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;color:var(--ink)}
  body{min-height:100vh}
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;padding:0}
  ::-webkit-scrollbar{width:0;height:0}
  /* Phone scroll area */
  .pscroll{scrollbar-width:none}
  .pscroll::-webkit-scrollbar{display:none}
  /* Stage */
  .stage{
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;
    gap:48px;padding:60px 40px 80px;
    background:
      radial-gradient(1200px 600px at 50% -10%, #DCE9FA 0%, transparent 60%),
      radial-gradient(800px 400px at 90% 30%, #E5EEFB 0%, transparent 60%),
      #EEF2F8;
  }
  .stage-head{position:fixed;top:20px;left:24px;display:flex;align-items:center;gap:10px;z-index:100;color:var(--ink-2);font-size:13px}
  .stage-head .dot{width:8px;height:8px;border-radius:99px;background:var(--brand)}
  .stage-head b{color:var(--ink);font-weight:600}
  /* Phone frame */
  .phone{
    width:390px;height:844px;border-radius:54px;
    background:#000;padding:14px;position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,
      0 50px 100px -20px rgba(15,31,58,.35),
      0 30px 60px -30px rgba(15,31,58,.25),
      0 0 0 1.5px #1A1A1F,
      0 0 0 4px #2A2D35,
      0 0 0 5px #11141A;
  }
  .phone .screen{
    width:100%;height:100%;border-radius:42px;overflow:hidden;
    background:var(--bg);position:relative;
  }
  .island{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;border-radius:99px;background:#000;z-index:50;
  }
  .home-indicator{
    position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:99px;background:rgba(0,0,0,.32);z-index:50;
  }
  /* Side panel */
  .side{width:300px;display:flex;flex-direction:column;gap:18px;padding-top:30px}
  .side h1{font-size:30px;line-height:1.2;margin:0 0 4px;letter-spacing:-.5px}
  .side .sub{color:var(--ink-3);font-size:14px;line-height:1.6}
  .side .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
  .side .grid button{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;font-size:12.5px;color:var(--ink-2);text-align:left;
    transition:all .15s;display:flex;flex-direction:column;gap:2px;
  }
  .side .grid button:hover{border-color:var(--brand);color:var(--brand)}
  .side .grid button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .side .grid button .label{font-size:11px;color:var(--ink-3)}
  .side .grid button.on .label{color:rgba(255,255,255,.7)}
  .side .legend{font-size:11px;color:var(--ink-3);display:flex;gap:8px;align-items:center}
  .side .legend span{padding:3px 8px;border-radius:99px;background:var(--brand-soft);color:var(--brand-deep);font-weight:500}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-repair.jsx"></script>
<script type="text/babel" src="screens-info.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
